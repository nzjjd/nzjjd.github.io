<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<title>节气灵境·三语共生</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a140e;font-family:'Noto Serif SC','KaiTi',serif;padding:0.5rem;min-height:100vh}
.scroll-master{max-width:1480px;margin:0 auto;background:rgba(245,236,218,0.92);border-radius:60px 28px 72px 28px;box-shadow:0 30px 50px rgba(0,0,0,0.35);padding:0.5rem 0.8rem 1rem;border:1px solid #dcc8a0}
.header-sacred{text-align:center;border-bottom:2px solid #ceb27a;padding-bottom:0.4rem;margin-bottom:0.8rem}
.header-sacred h1{font-size:2.2rem;letter-spacing:6px;color:#2d1f0e;text-shadow:2px 2px 4px rgba(80,50,20,0.2)}
.header-sacred h1 small{font-size:0.7rem;background:#dfcdab;padding:2px 12px;border-radius:40px;margin-left:8px;font-weight:normal}
.sub-inspire{margin-top:4px;display:flex;justify-content:center;gap:12px;font-size:0.65rem;color:#7b5e3c;flex-wrap:wrap}
.sub-inspire span{background:#f2e6d4;padding:2px 12px;border-radius:40px}
.accordion-gallery{display:flex;gap:12px;height:74vh;overflow-x:auto;padding:6px 2px 12px;align-items:center}
.accordion-gallery::-webkit-scrollbar{height:4px}
.accordion-gallery::-webkit-scrollbar-thumb{background:#b88d54;border-radius:8px}
.card-term{position:relative;width:72px;height:84%;border-radius:28px;transition:all 0.5s cubic-bezier(0.15,0.85,0.35,1.1);cursor:pointer;flex-shrink:0;overflow:hidden;box-shadow:0 12px 24px rgba(0,0,0,0.4)}
.card-term:hover{transform:scale(1.01)}
.card-term.active{width:620px;background:#fffcf0!important}
.title-vertical{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);writing-mode:vertical-rl;font-size:24px;letter-spacing:8px;color:#fff9e8;text-shadow:0 0 10px #1a0e04;font-family:"Ma Shan Zheng",cursive;pointer-events:none;white-space:nowrap}
.card-term.active .title-vertical{display:none}
.detail-panel{display:none;width:100%;height:100%;overflow-y:auto;padding:10px 14px}
.card-term.active .detail-panel{display:block}
.charm-card{background:rgba(250,243,230,0.88);border-radius:24px;padding:10px 14px;margin-bottom:12px;border-left:5px solid #c2a15b}
.section-legend{font-size:0.95rem;font-weight:bold;color:#5a391e;border-bottom:1px dashed #d4bc90;padding-bottom:4px;margin-bottom:8px}
.lang-switch-set{display:flex;gap:8px;margin:6px 0}
.lang-pill{background:#ede0cd;border:none;padding:3px 14px;border-radius:40px;cursor:pointer;font-family:inherit;font-size:0.75rem}
.lang-pill.active{background:#b48c48;color:#fff}
.trilingual-box{background:#fffcf0;padding:8px 12px;border-radius:16px;line-height:1.5;font-size:0.8rem}
.poem-miniature{background:#fef5e6;border-radius:16px;padding:6px;margin-top:8px;font-size:0.7rem;border:1px solid #ecdbba}
.quad-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.quad-img{background-size:cover!important;background-position:center!important;border-radius:14px;aspect-ratio:1/1;box-shadow:inset 0 0 0 2px #faf0df}
.qa-item{background:#f8efdf;border-radius:30px;padding:5px 12px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;font-size:0.75rem}
.qa-answer-panel{display:none;margin-top:4px;background:#fff7eb;padding:8px;border-radius:20px;font-size:0.7rem;line-height:1.4}
.chat-input-row{display:flex;gap:4px;margin-top:6px}
.chat-input-row input{flex:3;padding:4px 10px;border-radius:40px;border:1px solid #cfb380;background:#fffcf5;font-size:0.7rem}
.chat-input-row button{background:#b48c48;border:none;color:#fff;padding:4px 12px;border-radius:40px;cursor:pointer;font-size:0.7rem}
.chat-response{background:#fcf6e8;padding:6px 10px;border-radius:16px;margin-top:6px;font-size:0.7rem;display:none;border-left:3px solid #b48c48}
.emotion-cloud{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0}
.emotion-btn{background:#e9dac8;border:none;padding:4px 14px;border-radius:40px;cursor:pointer;font-family:inherit;font-size:0.75rem;transition:0.15s}
.emotion-btn:hover{background:#b48c48;color:#fff}
canvas.cloud-canvas{width:100%;height:120px;display:block;border-radius:14px}
.resonance-hint{font-size:0.6rem;color:#906e42}

.postcard-box{margin-top:12px;text-align:center}
.postcard-btn{background:#b48c48;color:#fff;border:none;padding:6px 16px;border-radius:30px;font-size:0.75rem;cursor:pointer;margin:4px}
.postcard-preview{margin:10px auto;max-width:280px;border-radius:16px;overflow:hidden;box-shadow:0 8px 16px rgba(0,0,0,0.2);display:none}
.postcard-preview img{width:100%;display:block}

.audio-theater{background:rgba(245,236,218,0.7);border-radius:24px;padding:8px 12px;margin-top:10px}
.audio-track{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:0.7rem}
.audio-track input[type=range]{flex:1;height:3px;accent-color:#b48c48}
.audio-track .track-label{min-width:56px;color:#5a391e}
.narration-select{display:flex;gap:4px;margin:6px 0;align-items:center}
.narration-select button{background:#ede0cd;border:none;padding:2px 10px;border-radius:30px;cursor:pointer;font-size:0.65rem}
.narration-select button.active{background:#b48c48;color:#fff}
.tts-play-btn{background:#8f6b3e;border:none;color:#fff;padding:3px 12px;border-radius:40px;cursor:pointer;font-size:0.65rem}
.footprint-bar{display:flex;align-items:center;gap:4px;margin:0.3rem 0 0.6rem;padding:4px 10px;background:rgba(240,228,210,0.6);border-radius:40px;font-size:0.7rem;color:#7b5e3c;overflow-x:auto}
.footprint-dot{width:16px;height:16px;border-radius:50%;background:#dcccaf;flex-shrink:0;border:1px solid #c2a15b;transition:0.3s;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px}
.footprint-dot.unlocked{background:#b48c48;border-color:#7a582c;color:#fff}
.fp-progress-text{margin-left:auto;font-weight:bold;color:#2d1f0e}
.close-ritual{display:none;position:absolute;top:8px;right:10px;background:rgba(0,0,0,0.3);border:none;border-radius:50%;width:24px;height:24px;color:#f7efdb;font-size:16px;cursor:pointer;z-index:20;align-items:center;justify-content:center}
.card-term.active .close-ritual{display:flex}
@media(max-width:700px){.card-term.active{width:94vw}.header-sacred h1{font-size:1.4rem;letter-spacing:3px}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
<div class="scroll-master">
  <div class="header-sacred">
    <h1>節氣靈境·三語共生 <small>诗画·智问·共鸣·音场</small></h1>
    <div class="sub-inspire">
      <span>🎋 古风手风琴</span><span>🖌️ AI诗画</span><span>🌐 三语智问</span>
      <span>💞 共鸣云图</span><span>🎵 四时音场</span><span>📩 三语明信片</span>
    </div>
  </div>
  <div class="footprint-bar" id="footprintBar"></div>
  <div class="accordion-gallery" id="accordionGenesis"></div>
  <div class="audio-theater">
    <div style="font-size:0.85rem;font-weight:bold;color:#5a391e;margin-bottom:4px;">🎵 四时音场</div>
    <div class="audio-track"><span class="track-label">🏔️ 环境</span><input type="range" id="envVol" min="0" max="1" step="0.05" value="0.6"><span id="envLbl">60%</span></div>
    <div class="audio-track"><span class="track-label">🎶 古乐</span><input type="range" id="musVol" min="0" max="1" step="0.05" value="0.5"><span id="musLbl">50%</span></div>
    <div class="audio-track"><span class="track-label">🗣️ 旁白</span><input type="range" id="ttsVol" min="0" max="1" step="0.05" value="0.8"><span id="ttsLbl">80%</span></div>
    <div class="narration-select">
      <span style="font-size:0.65rem;color:#5a391e;">语种:</span>
      <button class="active" data-narr="zh">中文</button><button data-narr="jp">日本語</button><button data-narr="en">English</button>
      <span style="margin-left:auto;"><button class="tts-play-btn" id="playNarration">▶ 诵读</button></span>
    </div>
  </div>
</div>

<script>
const ST=[
{id:"立春",cn:"立春",jp:"立春",en:"Start of Spring",sea:"spring",dz:"立春为岁首，东风解冻，蛰虫始振。迎春咬春，阳气升腾，万物复苏。",dj:"立春は一年の始まり。東風が凍てつきを解かし、虫が動き始める。",de:"Start of Spring: east wind thaws ice, insects stir."},
{id:"雨水",cn:"雨水",jp:"雨水",en:"Rain Water",sea:"spring",dz:"降雨渐增，草木萌动，水獭祭鱼，鸿雁北归。",dj:"雨が増え、草木が芽吹く。",de:"Rain increases, buds appear."},
{id:"惊蛰",cn:"惊蛰",jp:"啓蟄",en:"Awakening of Insects",sea:"spring",dz:"春雷始鸣，蛰虫惊走。桃花红，仓庚鸣。",dj:"春雷が鳴り冬眠の虫が目覚める。",de:"Spring thunder awakens insects."},
{id:"春分",cn:"春分",jp:"春分",en:"Spring Equinox",sea:"spring",dz:"昼夜均分，玄鸟至，雷声始电。",dj:"昼夜が等しく、燕が帰る。",de:"Equal day and night, swallows return."},
{id:"清明",cn:"清明",jp:"清明",en:"Pure Brightness",sea:"spring",dz:"气清景明，桐花始华，彩虹出现。",dj:"清浄明潔、桐の花咲く。",de:"Clear and bright, paulownia blooms."},
{id:"谷雨",cn:"谷雨",jp:"穀雨",en:"Grain Rain",sea:"spring",dz:"雨生百谷，浮萍生，布谷催耕。",dj:"雨が穀物を育て、浮き草が生える。",de:"Rain nurtures grains, cuckoos call."},
{id:"立夏",cn:"立夏",jp:"立夏",en:"Start of Summer",sea:"summer",dz:"夏季开始，蝼蝈鸣，蚯蚓出。",dj:"夏の始まり、ケラが鳴く。",de:"Summer begins, crickets chirp."},
{id:"小满",cn:"小满",jp:"小満",en:"Grain Buds",sea:"summer",dz:"麦粒渐满，苦菜秀。",dj:"麦の実が膨らむ。",de:"Wheat grains plump."},
{id:"芒种",cn:"芒种",jp:"芒種",en:"Grain in Ear",sea:"summer",dz:"有芒之谷可播种，螳螂生。",dj:"芒のある穀物を蒔く。",de:"Harvest awned wheat."},
{id:"夏至",cn:"夏至",jp:"夏至",en:"Summer Solstice",sea:"summer",dz:"白昼最长，阳极阴生。",dj:"昼が最も長い。陽極まり陰生ず。",de:"Longest day, yang peaks."},
{id:"小暑",cn:"小暑",jp:"小暑",en:"Minor Heat",sea:"summer",dz:"温风至，蟋蟀居宇，鹰始鸷。",dj:"温風至り、蟋蟀宇に居る。",de:"Warm winds arrive, crickets dwell."},
{id:"大暑",cn:"大暑",jp:"大暑",en:"Major Heat",sea:"summer",dz:"腐草为萤，土润溽暑，大雨时行。",dj:"腐草蛍と為り、土潤溽暑。",de:"Fireflies from grass, damp heat."},
{id:"立秋",cn:"立秋",jp:"立秋",en:"Start of Autumn",sea:"autumn",dz:"凉风至，白露降，寒蝉鸣。",dj:"涼しい風が吹く。白露降りる。",de:"Cool breezes arrive, dew descends."},
{id:"处暑",cn:"处暑",jp:"処暑",en:"End of Heat",sea:"autumn",dz:"暑气消退，鹰乃祭鸟，天地始肃。",dj:"暑気が収まる。鷹鳥を祭る。",de:"Heat subsides, hawks sacrifice."},
{id:"白露",cn:"白露",jp:"白露",en:"White Dew",sea:"autumn",dz:"露凝白，鸿雁来，玄鸟归。",dj:"露が白く染まる。鴻雁来る。",de:"White dew, wild geese arrive."},
{id:"秋分",cn:"秋分",jp:"秋分",en:"Autumnal Equinox",sea:"autumn",dz:"昼夜均，雷始收声，蛰虫坯户。",dj:"昼夜等しく、雷声を収める。",de:"Day and night equal."},
{id:"寒露",cn:"寒露",jp:"寒露",en:"Cold Dew",sea:"autumn",dz:"露气寒冷，鸿雁来宾，菊有黄华。",dj:"露気寒冷、鴻雁賓と為る。",de:"Cold dew, chrysanthemums bloom."},
{id:"霜降",cn:"霜降",jp:"霜降",en:"Frost's Descent",sea:"autumn",dz:"霜始降，草木黄落，蛰虫咸俯。",dj:"初霜が降りる。草木黄落し。",de:"First frost, leaves fall."},
{id:"立冬",cn:"立冬",jp:"立冬",en:"Start of Winter",sea:"winter",dz:"水始冰，地始冻，雉入大水为蜃。",dj:"水が凍り始める。地凍り始める。",de:"Water freezes, earth hardens."},
{id:"小雪",cn:"小雪",jp:"小雪",en:"Minor Snow",sea:"winter",dz:"虹藏不见，天气上升，闭塞成冬。",dj:"虹藏れて見えず、閉塞して冬と成る。",de:"Rainbows hide, winter closes in."},
{id:"大雪",cn:"大雪",jp:"大雪",en:"Major Snow",sea:"winter",dz:"雪量增大，天地苍茫。",dj:"雪が深まる。天地蒼茫。",de:"Heavy snow, vast white wilderness."},
{id:"冬至",cn:"冬至",jp:"冬至",en:"Winter Solstice",sea:"winter",dz:"阴极阳生，数九开始。",dj:"陰極まり陽生ず。数九始まる。",de:"Yin peaks, yang arises."},
{id:"小寒",cn:"小寒",jp:"小寒",en:"Minor Cold",sea:"winter",dz:"雁北乡，鹊始巢，雉始雊。",dj:"雁北に郷う。鵲始めて巣くう。",de:"Geese head north, magpies nest."},
{id:"大寒",cn:"大寒",jp:"大寒",en:"Major Cold",sea:"winter",dz:"寒气至极，鸡始乳，征鸟厉疾。",dj:"寒気極まる。鶏始めて乳す。",de:"Cold peaks, chickens hatch."}
];

// 完全恢复你原来的本地图片路径
const TERM_FILES = {
  '立春':'lichun','雨水':'yushui','惊蛰':'jingzhe','春分':'chunfen',
  '清明':'qingming','谷雨':'guyu','立夏':'lixia','小满':'xiaoman',
  '芒种':'mangzhong','夏至':'xiazhi','小暑':'xiaoshu','大暑':'dashu',
  '立秋':'liqiu','处暑':'chushu','白露':'bailu','秋分':'qiufen',
  '寒露':'hanlu','霜降':'shuangjiang','立冬':'lidong','小雪':'xiaoxue',
  '大雪':'daxue','冬至':'dongzhi','小寒':'xiaohan','大寒':'dahan'
};
function termImg(t){
  return 'qi_img/'+(TERM_FILES[t.id]||t.id)+'.jpg';
}

const root=document.getElementById('accordionGenesis');
const fpBar=document.getElementById('footprintBar');
let RS={};ST.forEach(t=>RS[t.id]={希望:0,思念:0,宁静:0,热烈:0});
let FP={};ST.forEach(t=>FP[t.id]=false);
let GR={希望:0,思念:0,宁静:0,热烈:0};

function buildFP(){
  fpBar.innerHTML='<span style="font-weight:bold;color:#2d1f0e;white-space:nowrap;">🏮 足迹</span>';
  const os=['spring','summer','autumn','winter'];
  const gp={};os.forEach(s=>gp[s]=ST.filter(t=>t.sea===s));
  const flat=[].concat(...os.map(s=>gp[s]));
  const cnt=ST.filter(t=>FP[t.id]).length;
  flat.forEach(t=>{
    const d=document.createElement('div');
    d.className='footprint-dot'+(FP[t.id]?' unlocked':'');
    d.title=t.cn;
    if(FP[t.id])d.textContent='✓';
    d.onclick=()=>{
      document.querySelectorAll('.card-term').forEach(c=>{
        if(c.dataset.tid===t.id){openCard(c);c.scrollIntoView({behavior:'smooth',block:'center'})}
      })
    };
    fpBar.appendChild(d);
  });
  const s=document.createElement('span');
  s.className='fp-progress-text';
  s.innerHTML=`${cnt}/24 ${Math.round(cnt/24*100)}%`;
  fpBar.appendChild(s);
}

function openCard(c){
  document.querySelectorAll('.card-term.active').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');
  const id=c.dataset.tid;
  if(!FP[id]){FP[id]=true;buildFP()}
  drawCloud(id);
}

function drawCloud(id){
  document.querySelectorAll('.detail-panel').forEach(d=>{
    if(d.dataset.tid!==id)return;
    const ce=d.querySelector('canvas.cloud-canvas');
    if(!ce)return;
    const ctx=ce.getContext('2d');
    ctx.clearRect(0,0,ce.width,ce.height);
    ctx.fillStyle='#fcf6e8';
    ctx.fillRect(0,0,ce.width,ce.height);
    ctx.fillStyle='#d4bc90';
    ctx.font='8px monospace';
    ctx.textAlign='center';
    ctx.fillText('✦ 共鸣 ✦',ce.width/2,ce.height-6);
  })
}

// 三语明信片 + 兼容本地图片
async function createPostcard(termId){
  const t = ST.find(x=>x.id===termId);
  if(!t)return alert('请先打开节气卡片');

  const wrap = document.createElement('div');
  wrap.style.width = '600px';
  wrap.style.padding = '24px';
  wrap.style.background = '#fffcf0';
  wrap.style.borderRadius = '24px';
  wrap.style.textAlign = 'center';
  wrap.style.fontFamily = "'Noto Serif SC', KaiTi, serif";

  wrap.innerHTML = `
    <div style="font-size:36px; font-family:'Ma Shan Zheng', cursive; color:#8c5a2c; margin-bottom:12px;">${t.cn}</div>
    <img src="${termImg(t)}" style="width:100%;border-radius:16px;margin-bottom:16px;">
    <div style="font-size:15px; color:#5a391e; line-height:1.7;">${t.dz}</div>
    <div style="font-size:13px; color:#7a5e3c; line-height:1.6;">${t.dj}</div>
    <div style="font-size:12px; color:#906e42; line-height:1.6;">${t.de}</div>
    <div style="font-size:12px; color:#b48c48; margin-top:12px;">節氣靈境 · 中日英三語共生</div>
  `;
  document.body.appendChild(wrap);

  const canvas = await html2canvas(wrap, {
    scale:2,
    backgroundColor:'#fffcf0',
    useCORS:false,
    allowTaint:true
  });
  document.body.removeChild(wrap);
  const url = canvas.toDataURL('image/png');

  const prev = document.querySelector('.postcard-preview');
  prev.querySelector('img').src = url;
  prev.style.display = 'block';

  const a = document.createElement('a');
  a.href = url;
  a.download = `节气明信片_${t.cn}_三语版.png`;
  a.click();

  if(navigator.share){
    navigator.share({title:`${t.cn}·三语节气卡`,text:`${t.dz}｜${t.dj}｜${t.de}`,url:location.href});
  }
}

// 构建卡片
ST.forEach(t=>{
  const card=document.createElement('div');
  card.className='card-term';
  card.dataset.tid=t.id;
  const sc={spring:'#7ab648',summer:'#d4a54a',autumn:'#c47030',winter:'#6090b0'};
  card.style.backgroundImage='url('+termImg(t)+')';
  card.style.backgroundSize='cover';
  card.style.backgroundPosition='center 30%';
  card.style.boxShadow='0 12px 24px rgba(0,0,0,0.4), inset 0 0 0 2px '+(sc[t.sea]||'#b08860');
  
  const tv=document.createElement('div');
  tv.className='title-vertical';
  tv.textContent=t.cn;
  
  const closeBtn=document.createElement('button');
  closeBtn.className='close-ritual';
  closeBtn.textContent='✕';
  
  const dp=document.createElement('div');
  dp.className='detail-panel';
  dp.dataset.tid=t.id;
  
  var _ti=termImg(t), _qs=[{x:0,y:0},{x:1,y:0},{x:0,y:1},{x:1,y:1}];
  dp.innerHTML=`
  <div class="charm-card">
    <div class="section-legend">📖 三语时令</div>
    <div class="lang-switch-set" data-ls="1">
      <button class="lang-pill active" data-l="zh">中文</button>
      <button class="lang-pill" data-l="jp">日本語</button>
      <button class="lang-pill" data-l="en">English</button>
    </div>
    <div class="trilingual-box" data-tp="1">${t.dz}</div>
  </div>
  <div class="charm-card">
    <div class="section-legend">🎨 诗画拼图</div>
    <div class="quad-grid">
      <div class="quad-img" style="background:url(${_ti}) 0% 0% / 200% 200%"></div>
      <div class="quad-img" style="background:url(${_ti}) 100% 0% / 200% 200%"></div>
      <div class="quad-img" style="background:url(${_ti}) 0% 100% / 200% 200%"></div>
      <div class="quad-img" style="background:url(${_ti}) 100% 100% / 200% 200%"></div>
    </div>
  </div>
  <div class="charm-card">
    <div class="section-legend">💞 情感共鸣</div>
    <div class="emotion-cloud">
      <button class="emotion-btn" data-e="希望">🌱 希望</button>
      <button class="emotion-btn" data-e="思念">🍃 思念</button>
      <button class="emotion-btn" data-e="宁静">🍂 宁静</button>
      <button class="emotion-btn" data-e="热烈">☀️ 热烈</button>
    </div>
    <canvas class="cloud-canvas" width="400" height="100"></canvas>
  </div>
  <div class="postcard-box">

    <div class="postcard-preview"><img></div>
  </div>`;

  card.appendChild(tv);
  card.appendChild(closeBtn);
  card.appendChild(dp);
  root.appendChild(card);

  dp.querySelector('[data-ls]').onclick=e=>{
    const b=e.target.closest('.lang-pill');
    if(!b)return;
    b.parentElement.querySelectorAll('.lang-pill').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const l=b.dataset.l;
    const txt={zh:t.dz,jp:t.dj,en:t.de}[l]||t.dz;
    dp.querySelector('[data-tp]').textContent=txt;
  };

  card.onclick=e=>{
    if(e.target.closest('.close-ritual')){card.classList.remove('active');return}
    if(e.target.closest('.detail-panel'))return;
    openCard(card);
  };
});
