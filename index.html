];
function findAnswer(q,l){q=q.toLowerCase().replace(/[？?的]/g,'');for(let x of QA){if([x.qz.toLowerCase(),x.qj.toLowerCase(),x.qe.toLowerCase()].some(k=>q.includes(k)||k.includes(q)))return l==='jp'?x.aj:l==='en'?x.ae:x.az}if(/^(如何|怎么).*(介绍|解释)/.test(q))return '简洁的跨文化策略：先翻译节气名，再描述物候特征与民俗活动。';if(/^(为什么|为何)/.test(q))return '这是先民在农耕实践中总结的自然节律，融合天文、物候与人文智慧。';return '节气是太阳周年运动在黄道上的24个等分点，反映季节、气候和物候变化。';}

function buildFP(){fpBar.innerHTML='<span style="font-weight:bold;color:#2d1f0e;white-space:nowrap;">🏮 足迹</span>';const os=['spring','summer','autumn','winter'];const gp={};os.forEach(s=>gp[s]=ST.filter(t=>t.sea===s));const flat=[].concat(...os.map(s=>gp[s]));const cnt=ST.filter(t=>FP[t.id]).length;flat.forEach(t=>{const d=document.createElement('div');d.className='footprint-dot'+(FP[t.id]?' unlocked':'');d.title=t.cn;if(FP[t.id])d.textContent='✓';d.onclick=()=>{document.querySelectorAll('.card-term').forEach(c=>{if(c.dataset.tid===t.id){openCard(c);c.scrollIntoView({behavior:'smooth',block:'center'})}})};fpBar.appendChild(d)});const s=document.createElement('span');s.className='fp-progress-text';s.innerHTML=`${cnt}/24 ${Math.round(cnt/24*100)}%`;fpBar.appendChild(s)}
function openCard(c){document.querySelectorAll('.card-term.active').forEach(x=>x.classList.remove('active'));c.classList.add('active');const id=c.dataset.tid;if(!FP[id]){FP[id]=true;buildFP()}drawCloud(id)}
function drawCloud(id){document.querySelectorAll('.detail-panel').forEach(d=>{if(d.dataset.tid!==id)return;const ce=d.querySelector('canvas.cloud-canvas');if(!ce)return;const ctx=ce.getContext('2d');const data=RS[id]||{希望:0,思念:0,宁静:0,热烈:0};ctx.clearRect(0,0,ce.width,ce.height);ctx.fillStyle='#fcf6e8';ctx.fillRect(0,0,ce.width,ce.height);const ems=Object.entries(data).sort((a,b)=>b[1]-a[1]);const tot=ems.reduce((s,[,v])=>s+v,0)||1;const cm={希望:'#3a7a3a',思念:'#7a5a3a',宁静:'#4a6a8a',热烈:'#b04a2a'};const ej={希望:'🌱',思念:'🍃',宁静:'🍂',热烈:'☀️'};let x=15,y=25,lh=0;ems.forEach(([k,v])=>{const f=12+Math.max(0.3,v/tot)*30;ctx.font=`${f}px "KaiTi","Ma Shan Zheng",serif`;ctx.fillStyle=cm[k]||'#6e4f2a';const txt=`${ej[k]}${k} ${v}`,tw=ctx.measureText(txt).width;if(x+tw>ce.width-15){x=15;y+=lh+10;lh=0}ctx.fillText(txt,x,y);x+=tw+12;lh=Math.max(lh,f+3)});ctx.fillStyle='#d4bc90';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('✦ 共鸣 ✦',ce.width/2,ce.height-6)})}
ST.forEach(t=>{
  const card=document.createElement('div');card.className='card-term';card.dataset.tid=t.id;
  const sc={spring:'#7ab648',summer:'#d4a54a',autumn:'#c47030',winter:'#6090b0'};

  card.appendChild(tv);card.appendChild(closeBtn);card.appendChild(dp);root.appendChild(card);
  dp.querySelector('[data-ls]').onclick=e=>{const b=e.target.closest('.lang-pill');if(!b)return;b.parentElement.querySelectorAll('.lang-pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');const l=b.dataset.l,lm={zh:{d:t.dz,p:t.pz},jp:{d:t.dj,p:t.pj},en:{d:t.de,p:t.pe}};dp.querySelector('[data-tp]').textContent=lm[l]?.d||t.dz;dp.querySelector('[data-po]').innerHTML='✒️ '+(lm[l]?.p||t.pz).substring(0,65)};
  const qb=dp.querySelector('[data-qb]');
  QA.forEach(qa=>{const qd=document.createElement('div');qd.className='qa-item';qd.innerHTML='<span>❓ '+qa.qz+'</span><span style="color:#b27d48;">▼</span>';const ad=document.createElement('div');ad.className='qa-answer-panel';ad.innerHTML='<strong>📖 中文:</strong> '+qa.az+'<br><strong>🍁 日本語:</strong> '+qa.aj+'<br><strong>🌿 English:</strong> '+qa.ae;qd.onclick=e=>{e.stopPropagation();const v=ad.style.display==='block';qb.querySelectorAll('.qa-answer-panel').forEach(p=>p.style.display='none');ad.style.display=v?'none':'block'};qb.appendChild(qd);qb.appendChild(ad)});
  dp.querySelector('.ca').onclick=()=>{const inp=dp.querySelector('.ci');const q=inp.value.trim();if(!q)return;const al=dp.querySelector('.lang-pill.active')?.dataset.l||'zh';const ans=findAnswer(q,al);const cr=dp.querySelector('[data-cr]');cr.style.display='block';cr.innerHTML='<div style="color:#7b5e3c;margin-bottom:2px;"><strong>❓ '+q+'</strong></div><div><strong style="color:#b48c48;">'+({zh:'中文',jp:'日本語',en:'English'}[al]||'中文')+'灵境答:</strong> '+ans+'</div>'};
  dp.querySelector('.ci').onkeydown=e=>{if(e.key==='Enter')dp.querySelector('.ca').click()};
  dp.querySelector('.emotion-cloud').onclick=e=>{const b=e.target.closest('.emotion-btn');if(!b)return;const emo=b.dataset.e;RS[t.id][emo]=(RS[t.id][emo]||0)+1;GR[emo]=(GR[emo]||0)+1;drawCloud(t.id);dp.querySelector('[data-rh]').textContent='✨ "'+emo+'" 本节气'+RS[t.id][emo]+'人·全站'+GR[emo]+'人'};
  card.onclick=e=>{if(e.target.closest('.close-ritual')){card.classList.remove('active');AT.stopAll();return}if(e.target.closest('.detail-panel'))return;openCard(card);if(!AT.active)AT.init();AT.setSeason(t.sea)};
});
buildFP();
class AudioTheater{
  constructor(){this.ctx=null;this.eg=null;this.mg=null;this.tg=null;this.eo=null;this.mo=null;this.active=false;this.season='spring';this.narrLang='zh';}
  init(){
    if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(this.ctx.state==='suspended')this.ctx.resume();
    if(!this.eg){this.eg=this.ctx.createGain();this.eg.gain.value=0.6;this.eg.connect(this.ctx.destination);
      this.mg=this.ctx.createGain();this.mg.gain.value=0.5;this.mg.connect(this.ctx.destination);
      this.tg=this.ctx.createGain();this.tg.gain.value=0.8;this.tg.connect(this.ctx.destination);}
    this.active=true;
  }
  setSeason(s){if(s!==this.season){this.season=s;this.update()}}
  update(){
    if(!this.active||!this.ctx)return;
    try{if(this.eo)this.eo.stop();if(this.mo)this.mo.stop()}catch(e){}
    const bs=this.ctx.sampleRate*2;
    const b=this.ctx.createBuffer(1,bs,this.ctx.sampleRate);
    const d=b.getChannelData(0);
    const bf={spring:200,summer:300,autumn:150,winter:100}[this.season]||200;
    for(let i=0;i<bs;i++){const t=i/this.ctx.sampleRate;
      d[i]=Math.sin(2*Math.PI*bf*t)*0.08+Math.sin(2*Math.PI*bf*1.5*t)*0.04+(Math.random()-0.5)*0.02}
    const es=this.ctx.createBufferSource();es.buffer=b;es.loop=true;es.connect(this.eg);es.start();this.eo=es;
    const pt={spring:[261,294,330,392,440],summer:[294,330,392,440,523],autumn:[220,261,294,330,392],winter:[174,196,220,261,294]};
    const ns=pt[this.season]||pt.spring;
    const mb=this.ctx.createBuffer(1,this.ctx.sampleRate*4,this.ctx.sampleRate);
    const md=mb.getChannelData(0);
    for(let i=0;i<md.length;i++){const t=i/this.ctx.sampleRate,ni=Math.floor(t/0.8)%ns.length;
      md[i]=Math.sin(2*Math.PI*ns[ni]*t)*0.18*Math.max(0,Math.sin(Math.PI*(t%0.8)/0.8))}
    const ms=this.ctx.createBufferSource();ms.buffer=mb;ms.loop=true;ms.connect(this.mg);ms.start();this.mo=ms;
  }
  setEnv(v){if(this.eg)this.eg.gain.value=v}
  setMus(v){if(this.mg)this.mg.gain.value=v}
  setTTS(v){if(this.tg)this.tg.gain.value=v}
  speak(text,lang){
    if(!this.active)this.init();
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang==='jp'?'ja-JP':lang==='en'?'en-GB':'zh-CN';
    u.rate=0.75;u.pitch=0.9;u.volume=this.tg?this.tg.gain.value:0.6;
    const vs=window.speechSynthesis.getVoices();
    const m=vs.find(v=>v.lang.startsWith(u.lang.substring(0,2)));
    if(m)u.voice=m;
    window.speechSynthesis.speak(u);
  }
  stopAll(){
    try{if(this.eo)this.eo.stop();if(this.mo)this.mo.stop();if(window.speechSynthesis)window.speechSynthesis.cancel();if(this.ctx&&this.ctx.state!=='closed')this.ctx.suspend()}catch(e){}
    this.active=false;
  }
}
const AT=new AudioTheater();
['env','mus','tts'].forEach(k=>{
  const el=document.getElementById(k+'Vol');
  if(el)el.addEventListener('input',function(){const v=parseFloat(this.value);document.getElementById(k+'Lbl').textContent=Math.round(v*100)+'%';if(k==='env')AT.setEnv(v);else if(k==='mus')AT.setMus(v);else AT.setTTS(v)})
});
document.querySelectorAll('[data-narr]').forEach(b=>{b.onclick=()=>{document.querySelectorAll('[data-narr]').forEach(x=>x.classList.remove('active'));b.classList.add('active');AT.narrLang=b.dataset.narr}});
document.getElementById('playNarration').onclick=()=>{

  const t=id?ST.find(x=>x.id===id):ST[new Date().getMonth()*2]||ST[0];

  if(!AT.active)AT.init();
  AT.speak(AT.narrLang==='jp'?t.dj:AT.narrLang==='en'?t.de:t.dz,AT.narrLang)
};
document.onclick=()=>{if(!AT.active){AT.init();AT.update()}};
